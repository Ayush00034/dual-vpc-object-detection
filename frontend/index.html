<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOLOv8 Object Detection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 18px; font-weight: 600; }
    header span {
      font-size: 12px;
      background: #f0f0f0;
      padding: 3px 10px;
      border-radius: 20px;
      color: #666;
    }

    .container {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .stat-card .value {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .stat-card .label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 1.25rem;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 1rem;
    }

    .upload-zone {
      border: 2px dashed #d0d0d0;
      border-radius: 10px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #555;
      background: #fafafa;
    }

    .upload-zone svg {
      display: block;
      margin: 0 auto 10px;
      color: #aaa;
    }

    .upload-zone p { font-size: 14px; color: #555; }
    .upload-zone small { font-size: 12px; color: #aaa; }

    #file-input { display: none; }

    .preview-box {
      width: 100%;
      height: 240px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 240px;
      object-fit: contain;
      border-radius: 8px;
    }

    .preview-box .placeholder {
      font-size: 13px;
      color: #aaa;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: 1.5px solid #1a1a1a;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled {
      background: #ccc;
      border-color: #ccc;
      cursor: not-allowed;
    }

    .status-bar {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: none;
    }

    .status-bar.show { display: block; }
    .status-bar.loading { background: #e8f0fe; color: #1a56db; }
    .status-bar.success { background: #e3f5e1; color: #1e7e34; }
    .status-bar.error   { background: #fde8e8; color: #b91c1c; }

    .detection-list { display: flex; flex-direction: column; gap: 8px; }

    .det-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #f9f9f9;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    .det-name { font-size: 14px; font-weight: 600; }
    .det-conf { font-size: 12px; color: #888; margin-top: 2px; }

    .conf-bar-outer {
      width: 70px;
      height: 5px;
      background: #e5e5e5;
      border-radius: 3px;
      overflow: hidden;
    }

    .conf-bar-inner {
      height: 100%;
      background: #22c55e;
      border-radius: 3px;
    }

    .empty-state {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .main-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>YOLOv8 Object Detection</h1>
  <span>Cloud Inference API</span>
</header>

<div class="container">

  <div class="stats">
    <div class="stat-card">
      <div class="value" id="stat-objects">0</div>
      <div class="label">Objects found</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-conf">—</div>
      <div class="label">Avg confidence</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-time">—</div>
      <div class="label">Response time</div>
    </div>
  </div>

  <div class="main-grid">

    <div class="panel">
      <div class="panel-title">Upload image</div>

      <div class="upload-zone" id="drop-zone">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drop image here or click to browse</p>
        <small>JPG, PNG, WEBP — max 10MB</small>
        <input type="file" id="file-input" accept="image/*">
      </div>

      <div class="preview-box" id="preview-box">
        <span class="placeholder">No image selected</span>
      </div>

      <button class="btn" id="detect-btn" disabled>
        Run detection
      </button>
    </div>

    <div class="panel">
      <div class="panel-title">Results</div>
      <div class="status-bar" id="status-bar"></div>
      <div id="results-container">
        <div class="empty-state">Upload an image to see results</div>
      </div>
    </div>

  </div>
</div>

<script>
  const API_URL = "http://yolo-alb-95858594.ap-south-1.elb.amazonaws.com/detect";

  const dropZone    = document.getElementById("drop-zone");
  const fileInput   = document.getElementById("file-input");
  const detectBtn   = document.getElementById("detect-btn");
  const previewBox  = document.getElementById("preview-box");
  const resultsEl   = document.getElementById("results-container");
  const statusBar   = document.getElementById("status-bar");
  const statObjects = document.getElementById("stat-objects");
  const statConf    = document.getElementById("stat-conf");
  const statTime    = document.getElementById("stat-time");

  let selectedFile = null;

  dropZone.addEventListener("click", () => fileInput.click());

  dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
  });

  dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
  });

  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith("image/")) loadFile(f);
  });

  fileInput.addEventListener("change", e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(f) {
    selectedFile = f;
    const url = URL.createObjectURL(f);
    previewBox.innerHTML = `<img src="${url}" alt="preview">`;
    detectBtn.disabled = false;
    resetResults();
  }

  function resetResults() {
    resultsEl.innerHTML = '<div class="empty-state">Click run detection</div>';
    setStatus("", "");
    statObjects.textContent = "0";
    statConf.textContent = "—";
    statTime.textContent = "—";
  }

  function setStatus(msg, type) {
    statusBar.textContent = msg;
    statusBar.className = "status-bar";
    if (type) {
      statusBar.classList.add("show", type);
    }
  }

  detectBtn.addEventListener("click", async () => {
    if (!selectedFile) return;

    detectBtn.disabled = true;
    detectBtn.textContent = "Detecting...";
    setStatus("Sending image to cloud API...", "loading");
    resultsEl.innerHTML = "";

    const formData = new FormData();
    formData.append("image", selectedFile);

    const startTime = Date.now();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: formData
      });

      const elapsed = Date.now() - startTime;

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const data = await res.json();

      setStatus(
        `Detection complete — ${data.count} object${data.count !== 1 ? "s" : ""} found`,
        "success"
      );

      statObjects.textContent = data.count;
      statTime.textContent = elapsed + "ms";

      if (data.detections.length > 0) {
        const avg = data.detections.reduce((s, d) => s + d.confidence, 0)
                    / data.detections.length;
        statConf.textContent = Math.round(avg * 100) + "%";
      }

      renderResults(data.detections);

    } catch (err) {
      setStatus("Error: " + err.message, "error");
      resultsEl.innerHTML = '<div class="empty-state">Detection failed</div>';
    } finally {
      detectBtn.disabled = false;
      detectBtn.textContent = "Run detection";
    }
  });

  function renderResults(detections) {
    if (!detections || detections.length === 0) {
      resultsEl.innerHTML = '<div class="empty-state">No objects detected</div>';
      return;
    }

    resultsEl.innerHTML = `
      <div class="detection-list">
        ${detections.map(d => `
          <div class="det-item">
            <div>
              <div class="det-name">${d.class}</div>
              <div class="det-conf">
                Confidence: ${Math.round(d.confidence * 100)}%
                &nbsp;·&nbsp;
                [${d.bbox.map(v => Math.round(v)).join(", ")}]
              </div>
            </div>
            <div class="conf-bar-outer">
              <div class="conf-bar-inner"
                   style="width: ${Math.round(d.confidence * 100)}%">
              </div>
            </div>
          </div>
        `).join("")}
      </div>
    `;
  }
</script>

</body>
</html>
